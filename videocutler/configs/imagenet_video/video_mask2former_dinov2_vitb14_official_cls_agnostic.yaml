_BASE_: "video_mask2former_R50_cls_agnostic.yaml"

MODEL:
  BACKBONE:
    NAME: "D2DinoV2ViTAdapterRegOfficial"
  WEIGHTS: ""
  DINO_ADAPTER_REGOFFICIAL:
    PRETRAINED: "../weights/DINOv2/dinov2_vitb14_reg4_pretrain_14to16.pth"
    IMG_SIZE: 592
    PATCH_SIZE: 16
    MLP_RATIO: 4.0
    INIT_VALUES: 1.0
    INTERPOLATE_ANTIALIAS: True
    INTERPOLATE_OFFSET: 0.0
    CONV_INPLANE: 64
    N_POINTS: 4
    WITH_CFFN: True
    CFFN_RATIO: 0.25
    ADD_VIT_FEATURE: True
    USE_EXTRA_EXTRACTOR: True
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    EMBED_DIM: 768
    DEPTH: 12
    NUM_HEADS: 12
    DROP_PATH_RATE: 0.3
    NUM_REGISTER_TOKENS: 4
    DEFORM_NUM_HEADS: 12
    DEFORM_RATIO: 0.5
    INTERACTION_INDEXES: [[0, 2], [3, 5], [6, 8], [9, 11]]
    FREEZE_VIT: True
    STRICT_PRETRAIN_LOAD: True
  SEM_SEG_HEAD:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
    DEFORMABLE_TRANSFORMER_ENCODER_IN_FEATURES: ["res3", "res4", "res5"]
INPUT:
  SAMPLING_FRAME_NUM: 2
SOLVER:
  MAX_ITER: 160000
  CHECKPOINT_PERIOD: 40000
  BACKBONE_MULTIPLIER: 0.1 # 1.0
  IMS_PER_BATCH: 1
  AMP:
    ENABLED: True
